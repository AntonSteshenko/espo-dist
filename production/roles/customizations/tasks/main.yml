---
- name: Sync custom directory
  synchronize:
    src: "{{ customizations_src }}/custom/"
    dest: "{{ deploy_path }}/espocrm/custom/"
    delete: yes
    rsync_opts:
      - "--exclude=.gitkeep"

- name: Sync client/custom directory
  synchronize:
    src: "{{ customizations_src }}/client/custom/"
    dest: "{{ deploy_path }}/espocrm/client/custom/"
    delete: yes
    rsync_opts:
      - "--exclude=.gitkeep"

- name: Set permissions on custom directories
  file:
    path: "{{ item }}"
    state: directory
    owner: www-data
    group: www-data
    recurse: yes
  loop:
    - "{{ deploy_path }}/espocrm/custom"
    - "{{ deploy_path }}/espocrm/client/custom"

- name: Rebuild EspoCRM cache
  community.docker.docker_container_exec:
    container: espocrm
    command: php rebuild.php
  when: run_rebuild | default(false)
